<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>グレースケール変換アプリ</title>
  <style>
    /* ページ全体のスタイル */
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    /* ファイル選択・ボタン周りのスタイル */
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    input[type="file"] {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    button {
      padding: 8px 24px;
      background-color: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background-color: #357abd;
    }

    /* エラーメッセージのスタイル */
    #error-message {
      color: red;
      margin-bottom: 16px;
      display: none; /* 初期状態では非表示 */
    }

    /* 画像を横並びに表示するコンテナ */
    .images-container {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* 各画像のカード */
    .image-card {
      flex: 1;
      min-width: 280px;
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      display: none; /* 初期状態では非表示 */
    }

    .image-card h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #555;
    }

    /* 表示する画像のスタイル */
    .image-card img {
      max-width: 100%;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <h1>グレースケール変換アプリ</h1>

  <!-- ファイル選択と変換ボタン -->
  <div class="controls">
    <input type="file" id="file-input" accept="image/*" />
    <button id="convert-btn" disabled>グレースケールに変換</button>
  </div>

  <!-- エラーメッセージ表示エリア -->
  <p id="error-message"></p>

  <!-- 変換前・変換後の画像を横並びで表示するエリア -->
  <div class="images-container">

    <!-- 元画像カード -->
    <div class="image-card" id="original-card">
      <h2>元画像</h2>
      <img id="original-img" src="" alt="元画像" />
    </div>

    <!-- 変換後画像カード -->
    <div class="image-card" id="result-card">
      <h2>グレースケール変換後</h2>
      <img id="result-img" src="" alt="グレースケール画像" />
    </div>

  </div>

  <script>
    // -------------------------------------------------------
    // 各HTML要素を取得して変数に保存する
    // -------------------------------------------------------
    const fileInput      = document.getElementById("file-input");
    const convertBtn     = document.getElementById("convert-btn");
    const errorMessage   = document.getElementById("error-message");
    const originalCard   = document.getElementById("original-card");
    const originalImg    = document.getElementById("original-img");
    const resultCard     = document.getElementById("result-card");
    const resultImg      = document.getElementById("result-img");

    // -------------------------------------------------------
    // ファイルが選択されたとき
    // -------------------------------------------------------
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];

      if (file) {
        // ボタンを有効化する
        convertBtn.disabled = false;

        // エラーメッセージを非表示にする
        errorMessage.style.display = "none";

        // 元画像をプレビュー表示する
        // FileReader を使ってローカルファイルをDataURLとして読み込む
        const reader = new FileReader();
        reader.onload = (e) => {
          originalImg.src = e.target.result; // 読み込んだ画像をimgタグにセット
          originalCard.style.display = "block"; // カードを表示する
        };
        reader.readAsDataURL(file);

        // 変換後の画像カードを一旦隠す（前の変換結果をリセット）
        resultCard.style.display = "none";
      } else {
        // ファイルが選択されていないときはボタンを無効化
        convertBtn.disabled = true;
      }
    });

    // -------------------------------------------------------
    // 「グレースケールに変換」ボタンが押されたとき
    // -------------------------------------------------------
    convertBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      // ファイルが選択されていない場合は何もしない
      if (!file) return;

      // ボタンを一時的に無効化して、連打を防ぐ
      convertBtn.disabled = true;
      convertBtn.textContent = "変換中...";

      // エラーメッセージを非表示にする
      errorMessage.style.display = "none";

      try {
        // FormData を使ってファイルをマルチパート形式でまとめる
        const formData = new FormData();
        formData.append("file", file); // "file" はバックエンドの引数名と一致させる

        // バックエンドのAPIにPOSTリクエストを送る
        const response = await fetch("http://localhost:8000/api/grayscale", {
          method: "POST",
          body: formData,
        });

        // レスポンスがエラーの場合は例外を投げる
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.detail || "変換に失敗しました。");
        }

        // レスポンスのバイナリデータ（PNG画像）を Blob として受け取る
        const blob = await response.blob();

        // Blob を画像URLに変換して <img> タグに表示する
        const imageUrl = URL.createObjectURL(blob);
        resultImg.src = imageUrl;
        resultCard.style.display = "block"; // 結果カードを表示する

      } catch (error) {
        // エラーが発生した場合はメッセージを表示する
        errorMessage.textContent = "エラー: " + error.message;
        errorMessage.style.display = "block";
      } finally {
        // 処理が終わったらボタンを元に戻す
        convertBtn.disabled = false;
        convertBtn.textContent = "グレースケールに変換";
      }
    });
  </script>

</body>
</html>
